services:
  # ---- Base de datos PostgreSQL ----
  db:
    image: postgres:17-alpine
    container_name: spm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # Expone el puerto solo en localhost de tu maquina, no a toda la red.
      - "127.0.0.1:5432:5432"
    volumes:
      - spm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend Spring Boot ----
  backend:
    build: ./backend
    container_name: spm-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  spm_pgdata:
