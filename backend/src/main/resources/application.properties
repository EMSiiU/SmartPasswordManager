# ============================================================
#  Smart Password Manager - Configuracion del backend
#  Los valores sensibles se leen de variables de entorno.
#  Sintaxis: ${VARIABLE:valor_por_defecto}
# ============================================================

spring.application.name=smart-password-manager

# ---- Base de datos (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartpm}
spring.datasource.username=${DB_USER:smartpm}
spring.datasource.password=${DB_PASSWORD:changeme}

# ---- JPA / Hibernate ----
# validate: Hibernate verifica que el esquema (creado por Flyway) coincida
# con las entidades, pero NO modifica la base de datos. Opcion segura.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ---- Flyway: migraciones del esquema ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- JWT (access token) ----
# El secreto DEBE venir del entorno. Minimo 32 caracteres para HS256.
jwt.secret=${JWT_SECRET}
# Vida del access token. Con refresh token activo, 15 min es el valor recomendado.
# El default sigue siendo 1h para no romper entornos sin refresh token configurado.
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# ---- Refresh token ----
# Cuántos días vive el refresh token antes de expirar naturalmente.
refresh.token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# ---- Cifrado de la boveda (AES-256) ----
# Clave en Base64 que decodifica a 32 bytes. Genera con: openssl rand -base64 32
app.crypto.secret=${CRYPTO_SECRET}

# ---- Servidor ----
server.port=${SERVER_PORT:8080}

# ---- Actuator: exponer solo el health check, nada mas ----
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
